<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forge</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #111827;
      --bg-tertiary: #1a2235;
      --bg-input: #0d1321;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      --accent: #f59e0b;
      --accent-dim: #92610a;
      --accent-glow: rgba(245, 158, 11, 0.15);
      --border: #1e293b;
      --success: #22c55e;
      --error: #ef4444;
      --warning: #f59e0b;
      --radius: 8px;
      --font-sans: 'Space Grotesk', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 18px;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--text-muted); font-weight: 300; }

    nav {
      display: flex;
      gap: 4px;
    }

    nav button {
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }

    nav button:hover { color: var(--text-primary); background: var(--bg-tertiary); }
    nav button.active { color: var(--accent); background: var(--accent-glow); }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .status-dot.ok { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.err { background: var(--error); }
    .status-dot.warn { background: var(--warning); }

    main {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .tab-content { display: none; height: 100%; flex-direction: column; }
    .tab-content.active { display: flex; }

    /* ---- CHAT TAB ---- */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 720px;
      line-height: 1.6;
      font-size: 15px;
    }

    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }

    .message .sender {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .message .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.user .bubble {
      background: var(--accent-glow);
      border: 1px solid var(--accent-dim);
      color: var(--text-primary);
    }

    .message.assistant .bubble {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
    }

    .message .meta {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    #chat-composer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg-secondary);
      display: flex;
      gap: 12px;
    }

    #chat-input {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 14px;
      padding: 12px 16px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      outline: none;
      resize: none;
      min-height: 48px;
      max-height: 200px;
    }

    #chat-input:focus { border-color: var(--accent-dim); }

    #chat-send {
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 14px;
      padding: 0 24px;
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.15s;
    }

    #chat-send:hover { opacity: 0.85; }
    #chat-send:disabled { opacity: 0.4; cursor: default; }

    /* ---- SETTINGS TAB ---- */
    #settings-content {
      padding: 32px;
      overflow-y: auto;
      max-width: 800px;
    }

    .settings-section {
      margin-bottom: 32px;
    }

    .settings-section h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 16px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .setting-card {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .setting-card label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-family: var(--font-mono);
    }

    .setting-card .value {
      font-size: 15px;
      color: var(--text-primary);
    }

    .setting-card input[type="text"],
    .setting-card input[type="number"],
    .setting-card input[type="password"] {
      width: 100%;
      font-family: var(--font-mono);
      font-size: 14px;
      padding: 8px 12px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-primary);
      outline: none;
    }

    .setting-card input:focus { border-color: var(--accent-dim); }

    .auth-btn {
      font-family: var(--font-sans);
      font-weight: 500;
      font-size: 13px;
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .auth-btn:hover { border-color: var(--accent-dim); color: var(--accent); }

    .auth-btn.save-btn {
      background: var(--accent);
      color: var(--bg-primary);
      border-color: var(--accent);
      font-weight: 600;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      font-family: var(--font-mono);
      z-index: 100;
      animation: slideIn 0.2s ease-out;
    }

    .toast.success { background: var(--success); color: #000; }
    .toast.error { background: var(--error); color: #fff; }

    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">forge<span>/zima</span></div>
    <nav>
      <button class="active" data-tab="chat">Chat</button>
      <button data-tab="settings">Settings</button>
    </nav>
    <div id="conn-status">
      <span class="status-dot warn"></span>
      <span style="font-size:13px;color:var(--text-muted)">connecting</span>
    </div>
  </header>

  <main>
    <div id="tab-chat" class="tab-content active">
      <div id="chat-messages"></div>
      <div id="chat-composer">
        <textarea id="chat-input" placeholder="Message forge..." rows="1"></textarea>
        <button id="chat-send">Send</button>
      </div>
    </div>

    <div id="tab-settings" class="tab-content">
      <div id="settings-content"></div>
    </div>
  </main>

  <script type="module" src="/views/app.js"></script>
</body>
</html>
