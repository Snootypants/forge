<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>forge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
:root {
  --paper: #f4ede0;
  --paper-deep: #ebe2d1;
  --paper-soft: #f8f2e7;
  --ink: #2a241e;
  --ink-soft: #5a4f42;
  --ink-mute: #8b7d6b;
  --ink-faint: #b8ab97;
  --rule: rgba(42, 36, 30, 0.12);
  --rule-strong: rgba(42, 36, 30, 0.22);
  --accent: #a04a28;
  --accent-soft: #c86a42;
  --accent-ink: #7a3518;
  --accent-wash: rgba(160, 74, 40, 0.08);
  --accent-wash-strong: rgba(160, 74, 40, 0.14);
  --ok: #5a7a3a;
  --warn: #b87a1e;
  --err: #a03824;
  --grain-opacity: 0.35;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; background: var(--paper); color: var(--ink);
  font-family: 'Inter Tight', system-ui, sans-serif;
  font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
input, textarea { font: inherit; color: inherit; }
::selection { background: var(--accent-wash-strong); color: var(--ink); }

.prose {
  font-family: 'Newsreader', Georgia, serif;
  font-weight: 400; font-size: 19px; line-height: 1.65;
  color: var(--ink); font-variation-settings: 'opsz' 18;
}
.prose p + p { margin-top: 0.9em; }
.prose strong { font-weight: 600; }
.prose em { font-style: italic; color: var(--ink-soft); }
.prose code {
  font-family: 'JetBrains Mono', monospace; font-size: 0.85em;
  background: var(--accent-wash); color: var(--accent-ink);
  padding: 0.1em 0.35em; border-radius: 3px;
}
.prose pre {
  font-family: 'JetBrains Mono', monospace; font-size: 14px; line-height: 1.55;
  background: var(--paper-soft); border: 1px solid var(--rule);
  border-left: 2px solid var(--accent); padding: 14px 18px;
  margin: 1em 0; overflow-x: auto; color: var(--ink-soft);
  white-space: pre-wrap; word-break: break-word;
}
.mono { font-family: 'JetBrains Mono', monospace; }
.smallcaps {
  font-family: 'Inter Tight', sans-serif; font-size: 10.5px;
  font-weight: 600; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--ink-mute);
}

*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb {
  background: var(--rule-strong); border-radius: 10px;
  border: 2px solid var(--paper);
}
*::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }

.paper-sheet { position: relative; isolation: isolate; }
.paper-sheet::before {
  content: ''; position: absolute; inset: 0;
  pointer-events: none; z-index: -1;
  opacity: var(--grain-opacity); mix-blend-mode: multiply;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='5'/><feColorMatrix values='0 0 0 0 0.15 0 0 0 0 0.12 0 0 0 0 0.08 0 0 0 0.55 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
}

@keyframes forge-pulse {
  0%, 100% { box-shadow: 0 0 0 0 var(--accent-wash-strong); }
  50%      { box-shadow: 0 0 0 5px transparent; }
}
@keyframes forge-dot-bounce {
  0%, 100% { opacity: 0.3; transform: translateY(0); }
  50%      { opacity: 1; transform: translateY(-3px); }
}
@keyframes toast-in {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}

.shell { display: flex; flex-direction: column; height: 100vh; }
.shell-header {
  display: flex; align-items: center; height: 56px;
  padding: 0 28px; border-bottom: 1px solid var(--rule);
  background: var(--paper); position: relative; z-index: 2; flex-shrink: 0;
}
.wordmark { display: flex; align-items: baseline; gap: 10px; }
.wordmark-name {
  font-family: 'Newsreader', serif; font-size: 22px; font-weight: 500;
  font-style: italic; letter-spacing: -0.01em; color: var(--ink);
}
.wordmark-tag { color: var(--ink-faint); font-size: 9.5px; }
.shell-nav { display: flex; gap: 2px; align-items: center; }
.tab-btn {
  font-size: 13.5px; font-weight: 500; padding: 7px 14px;
  color: var(--ink-mute); border-bottom: 1.5px solid transparent;
  border-radius: 0; margin-bottom: -1px; transition: color 120ms;
}
.tab-btn:hover { color: var(--ink-soft); }
.tab-btn.active { color: var(--ink); border-bottom-color: var(--accent); }
.status-pill { display: flex; align-items: center; gap: 7px; }
.status-pill .dot { width: 7px; height: 7px; border-radius: 50%; }
.status-pill .dot.ok { background: var(--ok); box-shadow: 0 0 0 3px color-mix(in srgb, var(--ok) 18%, transparent); }
.status-pill .dot.err { background: var(--err); }
.status-pill .dot.warn { background: var(--warn); }
.status-pill .label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-mute); letter-spacing: 0.02em; }
.shell-main { flex: 1; min-height: 0; display: flex; }
.tab-content { display: none; flex: 1; min-width: 0; }
.tab-content.active { display: flex; }

.chat-page { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(--paper); overflow: hidden; }
.chat-scroll { flex: 1; display: flex; min-height: 0; padding: 0 16px; }
.chat-columns { max-width: 1180px; width: 100%; margin: 0 auto; display: flex; align-items: stretch; flex: 1; min-height: 0; }
.rail { flex-shrink: 0; transition: width 180ms cubic-bezier(0.2, 0.8, 0.2, 1); overflow: hidden; overflow-y: auto; }
.rail-inner { padding: 20px 0; }
.rail-divider {
  position: relative; width: 10px; flex-shrink: 0;
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; z-index: 20;
}
.rail-divider .line { width: 1px; height: 100%; background: var(--rule); transition: background 150ms; }
.rail-divider:hover .line, .rail-divider.dragging .line { background: var(--accent); }
.rail-divider .grip {
  position: absolute; left: 50%;
  transform: translate(-50%, -50%) scale(0.4); opacity: 0;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--paper); border: 1.25px solid var(--accent);
  transition: opacity 160ms cubic-bezier(0.2, 0.8, 0.2, 1), transform 160ms cubic-bezier(0.2, 0.8, 0.2, 1);
  pointer-events: none; display: flex; align-items: center; justify-content: center;
}
.rail-divider:hover .grip, .rail-divider.dragging .grip { opacity: 1; transform: translate(-50%, -50%) scale(1); }
.grip-chevron { font-size: 9px; color: var(--accent); font-family: 'JetBrains Mono', monospace; line-height: 1; font-weight: 600; }
.chat-center { flex: 1; min-width: 0; padding: 44px 32px; position: relative; overflow-y: auto; }
.thread-spine {
  position: absolute; left: 32px; top: 24px; bottom: 24px; width: 1px;
  background: linear-gradient(to bottom, transparent, var(--rule-strong) 40px, var(--rule-strong) calc(100% - 40px), transparent);
}

.msg-assistant {
  position: relative; padding: 8px 8px 8px 40px;
  margin-left: -8px; margin-right: -8px; border-radius: 4px;
  cursor: pointer; transition: background 160ms;
}
.msg-assistant:hover { background: var(--accent-wash); }
.msg-assistant.selected { background: var(--accent-wash); }
.msg-assistant .node-dot {
  position: absolute; left: -4.5px; top: 20px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--paper); border: 1.5px solid var(--accent);
  transition: background 160ms;
}
.msg-assistant.selected .node-dot { background: var(--accent); }
.msg-assistant .sender { margin-bottom: 6px; color: var(--accent-ink); font-size: 10px; }
.msg-assistant .meta-line {
  display: flex; align-items: center; gap: 12px;
  margin-top: 12px; font-size: 11px; color: var(--ink-mute);
}
.msg-action {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  color: var(--ink-mute); padding: 2px 6px; border-radius: 3px;
}
.msg-action:hover { color: var(--accent); }
.msg-user { position: relative; padding-left: 40px; margin-top: 28px; display: flex; justify-content: flex-end; }
.msg-user .tick { position: absolute; left: 0; top: 14px; width: 10px; height: 1px; background: var(--rule-strong); }
.msg-user .bubble-wrap {
  max-width: 72%; background: var(--paper);
  border-radius: 14px 14px 4px 14px; position: relative; isolation: isolate;
}
.msg-user .bubble {
  background: var(--accent-wash-strong);
  border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent);
  border-radius: inherit; padding: 10px 14px;
  font-size: 14.5px; line-height: 1.5; color: var(--ink);
}
.msg-user .bubble-ts {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-mute); margin-top: 4px; text-align: right;
}
.thinking { position: relative; padding-left: 40px; margin-top: 36px; }
.thinking .node-dot {
  position: absolute; left: -4.5px; top: 12px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--paper); border: 1.5px solid var(--accent);
  animation: forge-pulse 1.1s ease-in-out infinite;
}
.forge-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent); animation: forge-dot-bounce 1.1s ease-in-out infinite;
}

.inspector { padding-top: 20px; display: flex; flex-direction: column; gap: 16px; font-size: 12px; }
.inspector-empty { padding-top: 20px; font-size: 12px; color: var(--ink-mute); line-height: 1.5; }
.trace-toggle {
  display: flex; align-items: center; gap: 6px;
  width: 100%; padding: 2px 0; color: var(--ink); text-align: left;
}
.trace-toggle .arrow {
  display: inline-block; width: 8px; font-size: 9px; color: var(--ink-mute);
  font-family: 'JetBrains Mono', monospace; transition: transform 120ms;
}
.trace-toggle .arrow.open { transform: rotate(90deg); }
.trace-toggle .count { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-faint); }
.trace-body { margin-top: 8px; }
.trace-prompt {
  margin: 0; padding: 10px 11px; background: var(--paper-deep);
  border: 1px solid var(--rule); border-radius: 4px;
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  line-height: 1.5; color: var(--ink-soft);
  white-space: pre-wrap; word-break: break-word; max-height: 220px; overflow-y: auto;
}
.recalled-item {
  display: flex; flex-direction: column; gap: 2px;
  padding-left: 10px; position: relative; border-left: 1px solid var(--rule-strong);
}
.recalled-item .dot { position: absolute; left: -3px; top: 4px; width: 5px; height: 5px; border-radius: 50%; }
.tool-call {
  border: 1px solid var(--rule); border-radius: 4px;
  padding: 7px 9px; background: var(--paper-deep);
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px; line-height: 1.45;
}
.usage-grid { display: grid; grid-template-columns: 1fr auto; row-gap: 5px; column-gap: 10px; font-size: 11px; }
.prompt-content {
  margin: 0; padding: 10px 11px; background: var(--paper-deep);
  border: 1px solid var(--rule); border-radius: 4px;
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  line-height: 1.5; color: var(--ink-soft);
  white-space: pre-wrap; word-break: break-word; max-height: 300px; overflow-y: auto;
}
.prompt-msg { margin-bottom: 10px; }
.prompt-msg:last-child { margin-bottom: 0; }
.prompt-role { font-size: 9px; margin-bottom: 3px; }
.prompt-role.user { color: var(--accent); }
.prompt-role.assistant { color: var(--ink-mute); }

.thread-meta { padding-top: 20px; display: flex; flex-direction: column; gap: 22px; }
.rail-stat .stat-label { margin-bottom: 2px; }
.rail-stat .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-soft); }
.context-meter { height: 3px; background: var(--paper-deep); border-radius: 2px; overflow: hidden; }
.context-meter .fill { height: 100%; background: var(--accent); }
.agent-row { display: flex; align-items: center; gap: 8px; min-width: 0; }
.agent-row .initial {
  flex-shrink: 0; width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600; font-family: 'JetBrains Mono', monospace;
}
.agent-row .name {
  font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--ink);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
}
.agent-row .time { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--ink-mute); flex-shrink: 0; }
.identity-file {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px; border: 1px solid var(--rule); border-radius: 4px;
  background: var(--paper-soft);
}
.identity-file .file-name { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink); }
.identity-file .btn-edit {
  font-family: 'Inter Tight', sans-serif; font-size: 10px; color: var(--accent);
  background: none; border: none; cursor: pointer; text-transform: uppercase;
  letter-spacing: 0.04em; font-weight: 500;
}
.identity-file .btn-edit:hover { text-decoration: underline; }
.identity-editor {
  margin-top: 8px; display: flex; flex-direction: column; gap: 8px;
}
.identity-editor textarea {
  width: 100%; min-height: 180px; padding: 10px; border: 1px solid var(--rule-strong);
  border-radius: 4px; background: var(--paper-deep); color: var(--ink);
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px; line-height: 1.5;
  resize: vertical;
}
.identity-editor .btn-row { display: flex; gap: 8px; justify-content: flex-end; }

.composer { border-top: 1px solid var(--rule); padding: 16px 48px 20px; }
.composer-inner { max-width: 820px; margin: 0 auto; }
.composer-box {
  display: flex; align-items: flex-end; gap: 10px;
  background: var(--paper-soft); border: 1px solid var(--rule-strong);
  border-radius: 12px; padding: 10px 12px 10px 16px; transition: border-color 140ms;
}
.composer-box:focus-within { border-color: var(--accent); }
.composer-input {
  flex: 1; min-height: 24px; max-height: 200px;
  background: transparent; border: none; outline: none; resize: none;
  font-size: 14.5px; line-height: 1.5; font-family: 'Inter Tight', sans-serif;
  color: var(--ink); padding: 3px 0;
}
.composer-send {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px 7px 14px; border-radius: 8px;
  font-size: 13px; font-weight: 500; transition: all 120ms;
}
.composer-send.ready { background: var(--accent); color: var(--paper); border: none; }
.composer-send.ready:hover { background: var(--accent-soft); }
.composer-send.idle { background: transparent; color: var(--ink-faint); border: 1px solid var(--rule); }
.composer-hints { display: flex; align-items: center; gap: 14px; margin-top: 8px; padding-left: 4px; font-size: 11px; color: var(--ink-mute); }

.settings-page { flex: 1; display: flex; min-width: 0; background: var(--paper); }
.settings-sidebar {
  width: 240px; flex-shrink: 0; border-right: 1px solid var(--rule);
  padding: 32px 16px; background: var(--paper-soft);
}
.settings-sidebar .title { padding: 0 12px; margin-bottom: 10px; }
.settings-sidebar nav { display: flex; flex-direction: column; gap: 1px; }
.nav-btn {
  text-align: left; padding: 9px 12px; border-radius: 6px;
  display: flex; flex-direction: column; gap: 1px;
  background: transparent; border-left: 2px solid transparent; transition: background 120ms;
}
.nav-btn:hover { background: var(--paper-deep); }
.nav-btn.active { background: var(--accent-wash); border-left-color: var(--accent); }
.nav-btn .name { font-size: 13.5px; font-weight: 500; color: var(--ink); }
.nav-btn.active .name { color: var(--accent-ink); }
.nav-btn .hint { font-size: 11px; color: var(--ink-mute); }
.settings-detail { flex: 1; overflow-y: auto; padding: 40px 56px 80px; }
.settings-detail-inner { max-width: 760px; }
.section-header { margin-bottom: 32px; }
.section-header h1 {
  font-family: 'Newsreader', serif; font-weight: 500; font-size: 30px;
  line-height: 1.1; letter-spacing: -0.01em; color: var(--ink); margin-bottom: 8px;
}
.section-header .lede {
  font-family: 'Newsreader', serif; font-size: 16px; line-height: 1.55;
  color: var(--ink-soft); font-style: italic; max-width: 560px;
}
.field { display: grid; grid-template-columns: 200px 1fr; gap: 32px; padding: 18px 0; border-top: 1px solid var(--rule); align-items: start; }
.field-label { margin-bottom: 4px; }
.field-hint { font-size: 12px; color: var(--ink-mute); line-height: 1.45; }
.field-input {
  width: 100%; padding: 9px 12px; background: var(--paper-soft);
  border: 1px solid var(--rule-strong); border-radius: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  color: var(--ink); outline: none; transition: border-color 120ms;
}
.field-input:focus { border-color: var(--accent); }
.field-value { font-family: 'JetBrains Mono', monospace; font-size: 13.5px; color: var(--ink); padding: 8px 0; }
.btn {
  padding: 7px 14px; font-size: 13px; font-weight: 500;
  background: transparent; color: var(--ink);
  border: 1px solid var(--rule-strong); border-radius: 6px; transition: all 120ms;
}
.btn:hover { border-color: var(--ink-faint); }
.btn-primary { background: var(--accent); color: var(--paper); border: none; }
.btn-primary:hover { background: var(--accent-soft); }
.status-badge {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 3px 10px 3px 8px; font-size: 11.5px; border-radius: 999px;
  font-family: 'JetBrains Mono', monospace;
}
.status-badge .dot { width: 6px; height: 6px; border-radius: 50%; }
.status-badge.ok { background: color-mix(in srgb, var(--ok) 10%, transparent); color: var(--ok); }
.status-badge.ok .dot { background: var(--ok); }
.status-badge.warn { background: color-mix(in srgb, var(--warn) 10%, transparent); color: var(--warn); }
.status-badge.warn .dot { background: var(--warn); }
.status-badge.err { background: color-mix(in srgb, var(--err) 10%, transparent); color: var(--err); }
.status-badge.err .dot { background: var(--err); }
.budget-meter { padding: 18px 20px; background: var(--paper-soft); border: 1px solid var(--rule); border-radius: 8px; margin-bottom: 24px; }
.budget-meter .amount { font-family: 'Newsreader', serif; font-size: 28px; font-weight: 500; color: var(--ink); }
.budget-meter .bar { height: 6px; background: var(--paper-deep); border-radius: 3px; overflow: hidden; }
.budget-meter .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-soft)); }
.db-row { display: grid; grid-template-columns: 1fr auto auto auto; gap: 24px; align-items: center; padding: 14px 0; border-top: 1px solid var(--rule); }

.login-gate { position: fixed; inset: 0; background: var(--paper); display: flex; align-items: center; justify-content: center; z-index: 100; }
.login-box { display: flex; flex-direction: column; align-items: center; }
.toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 6px; font-size: 13px; font-family: 'JetBrains Mono', monospace; z-index: 200; animation: toast-in 0.2s ease-out; }
.toast.success { background: var(--ok); color: #fff; }
.toast.error { background: var(--err); color: #fff; }
  </style>
</head>
<body>
  <div id="login-gate" class="login-gate">
    <div class="login-box">
      <span class="wordmark-name" style="font-size:32px">forge</span>
      <span class="smallcaps" style="margin-top:8px">memory · v1.0.0</span>
      <input id="login-token" type="password" class="field-input" placeholder="Auth token" style="margin-top:24px;width:320px;text-align:center">
      <button id="login-btn" class="btn btn-primary" style="margin-top:12px;width:320px;padding:10px">Connect</button>
      <span id="login-error" style="margin-top:8px;font-size:12px;color:var(--err);display:none"></span>
    </div>
  </div>

  <div id="app" class="shell" style="display:none">
    <header class="shell-header">
      <div class="wordmark">
        <span class="wordmark-name">forge</span>
        <span class="wordmark-tag smallcaps">memory · v1.0.0</span>
      </div>
      <div style="flex:1"></div>
      <nav class="shell-nav">
        <button class="tab-btn active" data-tab="chat">Chat</button>
        <button class="tab-btn" data-tab="settings">Settings</button>
      </nav>
      <div style="flex:1;display:flex;justify-content:flex-end;align-items:center;gap:14px">
        <div id="status-pill" class="status-pill">
          <span class="dot warn"></span>
          <span class="label">connecting</span>
        </div>
      </div>
    </header>
    <main class="shell-main">
      <div id="tab-chat" class="tab-content active"></div>
      <div id="tab-settings" class="tab-content"></div>
    </main>
  </div>

  <script type="module" src="/views/app.js"></script>
</body>
</html>
