forge:
  name: forge
  version: "0.1.0"
  root: .

user:
  name: your-name

api:
  anthropic:
    env: ANTHROPIC_API_KEY
  openai:
    env: OPENAI_API_KEY
  slack:
    bot_token:
      env: SLACK_BOT_TOKEN
    app_token:
      env: SLACK_APP_TOKEN
    bot_user_id: ""   # optional — auto-detected on connect
    channels: []      # optional allowlist of channel IDs
    allow_all_channels: false
    require_mention: true
    allow_yolo: false # set true only if Slack should drive yolo CLI providers

models:
  default: claude-sonnet-4-6
  architect: claude-opus-4-6
  sentinel: claude-haiku-4-5

llm:
  provider: claude-cli     # claude-cli | codex-cli | openai-api | anthropic-api
  model: claude-sonnet-4-6
  permission_mode: default # default | yolo; applies to CLI providers

paths:
  dbs: ./dbs
  identity: ./identity
  logs: ./logs

services:
  web:
    port: 6800
    host: 127.0.0.1
    context_window_tokens: 80000
    debug_prompt_context: false
  daemon:
    port: 6790

memory:
  retention_days: 30
  index_rebuild_interval_minutes: 15

budget:
  daily_limit_cents: 5000
  per_job_limit_cents: 1500
  warn_at_percent: 80
